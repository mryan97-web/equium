name: Build desktop miner

on:
  push:
    tags:
      - "miner-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            clients/desktop-miner/src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Linux Tauri dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            build-essential

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install JS deps
        working-directory: clients/desktop-miner
        run: npm install

      - name: Generate platform icons from source PNG
        working-directory: clients/desktop-miner
        run: npx tauri icon src-tauri/icons/icon.png

      - name: Build Tauri bundle
        working-directory: clients/desktop-miner
        env:
          TAURI_PRIVATE_KEY: ""
        run: npx tauri build --target ${{ matrix.target }}

      - name: Collect and rename artifacts
        shell: bash
        run: |
          mkdir -p out
          bundle_dir="clients/desktop-miner/src-tauri/target/${{ matrix.target }}/release/bundle"
          case "${{ matrix.label }}" in
            macos-arm64)
              find "$bundle_dir" -name "*.dmg" -exec cp {} out/Equium-Miner-aarch64.dmg \;
              cp out/Equium-Miner-aarch64.dmg out/Equium-Miner.dmg || true
              ;;
            macos-x64)
              find "$bundle_dir" -name "*.dmg" -exec cp {} out/Equium-Miner-x64.dmg \;
              ;;
            windows-x64)
              find "$bundle_dir" -name "*.msi" -exec cp {} out/Equium-Miner.msi \;
              find "$bundle_dir" -name "*-setup.exe" -exec cp {} out/Equium-Miner-setup.exe \;
              ;;
            linux-x64)
              find "$bundle_dir" -name "*.AppImage" -exec cp {} out/Equium-Miner.AppImage \;
              find "$bundle_dir" -name "*.deb" -exec cp {} out/Equium-Miner.deb \;
              ;;
          esac
          ls -la out/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: equium-miner-${{ matrix.label }}
          path: out/*
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/miner-v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          fail_on_unmatched_files: false
